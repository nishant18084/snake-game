<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Snake Game</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button onclick="changeDirection('UP')">🔼 UP</button>
            <div class="row">
                <button onclick="changeDirection('LEFT')">◀️ LEFT</button>
                <button onclick="changeDirection('RIGHT')">▶️ RIGHT</button>
            </div>
            <button onclick="changeDirection('DOWN')">🔽 DOWN</button>
        </div>

        <p>Mobile par khelne ke liye buttons ka use karein!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
