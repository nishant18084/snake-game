<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Hub: Snake & Racing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1 id="mainTitle">Arcade Hub</h1>
        
        <div class="score-board">
            <div>Score: <span id="currentScore">0</span></div>
            <div>Best: <span id="highScore">0</span></div>
            <div>💰 Coins: <span id="coinCount">0</span></div>
        </div>
        
        <div id="hubMenu" class="menu-screen">
            <p class="menu-title">SELECT GAME MODE</p>
            <div class="mode-container">
                <button class="hub-btn snake-hub" onclick="selectGame('snake')">🐍 Snake Neon Pro</button>
                <button class="hub-btn racing-hub" onclick="selectGame('racing')">🏎️ Turbo Racing</button>
            </div>
        </div>

        <div id="startMenu" class="menu-screen hidden">
            <button class="main-btn" onclick="showModes()">🎮 PLAY SNAKE</button>
            <button class="main-btn shop-btn-main" onclick="showShop()">🛒 SKIN SHOP</button>
            <button class="back-btn" onclick="backToHub()">🔙 Back to Hub</button>
        </div>

        <div id="shopMenu" class="menu-screen hidden">
            <p class="menu-title">✨ ULTIMATE SKIN SHOP ✨</p>
            <div class="shop-container" id="shopItemsContainer"></div>
            <button class="back-btn" onclick="hideShop()">🔙 Back</button>
        </div>

        <div id="modeMenu" class="menu-screen hidden">
            <p class="menu-title">SELECT DIFFICULTY</p>
            <div class="mode-container">
                <button class="mode-btn easy-btn" onclick="startGame(140)">🟢 Easy</button>
                <button class="mode-btn normal-btn" onclick="startGame(90)">🟡 Normal</button>
                <button class="mode-btn hard-btn" onclick="startGame(50)">🔴 Hard</button>
            </div>
            <button class="back-btn" onclick="showSnakeMenu()">🔙 Back</button>
        </div>

        <div id="gameArea" class="hidden">
            <div class="pause-container">
                <button id="pauseBtn" class="pause-btn" onclick="togglePause()">⏸️ Pause</button>
                <button class="pause-btn" style="background:#ff0055" onclick="location.reload()">🛑 Quit</button>
            </div>

            <div style="position: relative; display: inline-block;">
                <canvas id="gameCanvas" width="360" height="360"></canvas>
                <div id="pauseOverlay" class="pause-overlay hidden">GAME PAUSED</div>
            </div>
            
            <div class="controls">
                <button class="arrow-btn" onclick="handleControl('UP')">▲</button>
                <div class="row">
                    <button class="arrow-btn" onclick="handleControl('LEFT')">◀</button>
                    <button class="arrow-btn" onclick="handleControl('RIGHT')">▶</button>
                </div>
                <button class="arrow-btn" onclick="handleControl('DOWN')">▼</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
