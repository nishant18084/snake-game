<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Snake Game</h1>
        
        <div id="startMenu" class="menu-screen">
            <button class="main-start-btn" onclick="showModes()">🎮 Start Game</button>
        </div>

        <div id="modeMenu" class="menu-screen hidden">
            <p style="margin-bottom: 10px; font-weight: bold; color: #ffeb3b;">Choose Difficulty:</p>
            <div class="mode-container">
                <button class="mode-btn" onclick="startGame(150, this)">🟢 Easy</button>
                <button class="mode-btn" onclick="startGame(100, this)">🟡 Normal</button>
                <button class="mode-btn" onclick="startGame(50, this)">🔴 Hard</button>
            </div>
        </div>

        <div id="gameArea" class="hidden">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="controls">
                <button class="arrow-btn" onclick="changeDirection('UP')">🔼 UP</button>
                <div class="row">
                    <button class="arrow-btn" onclick="changeDirection('LEFT')">◀️ LEFT</button>
                    <button class="arrow-btn" onclick="changeDirection('RIGHT')">▶️ RIGHT</button>
                </div>
                <button class="arrow-btn" onclick="changeDirection('DOWN')">🔽 DOWN</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
